name: meta-signal
display_name: "Meta-Signal: Privacy-Constrained Ad Optimisation"
version: "1.0.0"
description: |
  An RL environment where an AI agent allocates advertising budget across three
  campaigns but can only observe noisy, aggregated conversion data -- exactly
  how Meta's real ad system works after signal loss.
  Models differential privacy budget depletion, mid-episode regime changes,
  correlation penalties, market-shift events, and regulatory audit mechanics.

author: Anvit2512
tags:
  - advertising
  - differential-privacy
  - reinforcement-learning
  - budget-optimisation
  - signal-loss

server:
  port: 7860
  health_endpoint: /health

endpoints:
  tasks:    GET  /tasks
  reset:    POST /reset
  step:     POST /step
  state:    GET  /state
  grader:   POST /grader
  simulate: POST /simulate
  baseline: POST /baseline

tasks:
  - id: 1
    name: "Budget Optimisation"
    difficulty: easy
    max_steps: 10
    target_roas: 1.5
    max_features: 5
    initial_epsilon: 3.0
    initial_budget: 1000.0
    note: "Correlation penalty fires when >70% spend concentrated on one campaign"

  - id: 2
    name: "Noisy Signal Recovery"
    difficulty: medium
    max_steps: 15
    target_roas: 1.5
    max_features: 3
    initial_epsilon: 3.0
    initial_budget: 1000.0
    note: "Market shift at step 9 -- camp_reels CVR doubles (viral trend)"

  - id: 3
    name: "Privacy Frontier"
    difficulty: hard
    max_steps: 15
    target_roas: 1.0
    max_features: 1
    initial_epsilon: 2.0
    initial_budget: 1000.0
    note: "Regulatory data minimisation in force from start; 1 feature max"

  - id: 4
    name: "Adversarial Regulator"
    difficulty: hard
    max_steps: 20
    target_roas: 1.0
    max_features: 3
    initial_epsilon: 3.0
    initial_budget: 1500.0
    note: "Regulatory audit fires at step 5; one campaign suspended mid-episode"

scoring:
  min: 0.0
  max: 1.0
  continuous: true
  partial_credit: true

action_schema:
  type: object
  properties:
    allocations:
      type: object
      description: "Dollar amount to spend per campaign. Keys: camp_feed, camp_reels, camp_stories"
      additionalProperties:
        type: number
        minimum: 0
    attribution:
      type: string
      enum: [last_click, probabilistic]
      default: last_click
      description: "last_click is free; probabilistic costs 0.20 epsilon extra"
    feature_mask:
      type: array
      items:
        type: string
      description: "Feature names from I1-I13 or C1-C26. Each costs 0.05 epsilon per step."
    halted_campaigns:
      type: array
      items:
        type: string
      description: "Task 4: campaigns to halt per regulatory order"
    legal_reason_code:
      type: string
      nullable: true
      description: "Task 4: GDPR_ART17 | GDPR_ART21 | CCPA_OPT_OUT | COPPA"

observation_schema:
  type: object
  properties:
    step:
      type: integer
    campaigns:
      type: array
      description: "Per-campaign noisy stats (list, indexed by campaign_id)"
      items:
        type: object
        properties:
          campaign_id:       { type: string }
          placement:         { type: string }
          impressions:       { type: integer }
          spend:             { type: number }
          noisy_conversions: { type: number }
          estimated_roas:    { type: number }
          ctr:               { type: number }
          confidence_interval:
            type: array
            items: { type: number }
    total_budget_remaining:
      type: number
    epsilon_remaining:
      type: number
    privacy_regime:
      type: string
      enum: [standard, high_noise, minimal_data, exhausted]
    available_features:
      type: array
      items: { type: string }
    regulatory_violation:
      type: boolean
    audit_active:
      type: boolean
    flagged_campaign:
      type: string
      nullable: true
    warning:
      type: string
      nullable: true
